## APT Cache options
cache_timeout: 600

# Common apt packages
_aodh_package_names_condition: >-
  {{
    (
      (ansible_facts['distribution'] | lower == 'debian' and ansible_facts['distribution_major_version'] is version('14', '>=')) or
        (ansible_facts['distribution'] | lower == 'ubuntu' and ansible_facts['distribution_version'] is version('26.04', '>='))
    )
  }}

aodh_distro_packages:
  - git
  - rpcbind
  - "{{ _aodh_package_names_condition | ternary('libxml2-16', 'libxml2') }}"

aodh_devel_distro_packages:
  - libffi-dev
  - libssl-dev
  - libsystemd-dev
  - libxml2-dev
  - libxslt1-dev
  - pkg-config

aodh_service_distro_packages:
  - python3-aodh
  - python3-systemd

aodh_test_distro_packages:
  - git
